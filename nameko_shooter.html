<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>見附出身のレアキャラを当てろ。</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700;
  --silver: #C0C0C0;
  --night-bg: #050a14;
  --night-mid: #0a1628;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'Noto Sans JP', sans-serif; background:#050a14; }

/* ===== SCREENS ===== */
.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .5s; }
.screen.hidden { opacity:0; pointer-events:none; }

/* ===== TITLE SCREEN ===== */
#titleScreen {
background: linear-gradient(180deg, #020810 0%, #06142a 40%, #0a1f3d 70%, #1a2a1a 100%);
overflow:hidden;
}
.stars-layer { position:absolute; inset:0; }
.star-dot { position:absolute; background:#fff; border-radius:50%; animation: twinkle var(–d,3s) var(–delay,0s) infinite alternate; }
@keyframes twinkle { from{opacity:.2;} to{opacity:1;} }

/* Houses silhouette */
.houses { position:absolute; bottom:0; left:0; right:0; }

/* Street lamp glow */
.lamp-glow {
position:absolute; bottom:18%; left:50%;
width:200px; height:200px;
background:radial-gradient(circle, rgba(255,220,100,.18) 0%, transparent 70%);
transform:translateX(-50%);
animation: lampPulse 3s infinite alternate;
}
@keyframes lampPulse { from{opacity:.7;} to{opacity:1;} }

.title-wrap { position:relative; z-index:10; text-align:center; padding:20px; }
.title-main {
font-size:clamp(1.4rem,5vw,2.2rem);
font-weight:900;
color:#fff;
text-shadow: 0 0 20px rgba(100,180,255,.8), 0 2px 4px rgba(0,0,0,.9);
line-height:1.4;
margin-bottom:8px;
}
.title-sub {
font-size:clamp(.9rem,3vw,1.1rem);
color:rgba(180,210,255,.7);
margin-bottom:40px;
letter-spacing:.2em;
}
.start-btn {
padding:16px 48px;
font-size:1.2rem;
font-weight:700;
font-family:‘Noto Sans JP’,sans-serif;
background:linear-gradient(135deg,#ff6b35,#ff3f00);
color:#fff;
border:none;
border-radius:50px;
cursor:pointer;
box-shadow:0 0 30px rgba(255,100,0,.6), 0 4px 20px rgba(0,0,0,.5);
transition:transform .15s, box-shadow .15s;
animation: btnPulse 2s infinite alternate;
}
.start-btn:hover { transform:scale(1.06); box-shadow:0 0 50px rgba(255,100,0,.9),0 4px 20px rgba(0,0,0,.5); }
@keyframes btnPulse { from{box-shadow:0 0 20px rgba(255,100,0,.5),0 4px 20px rgba(0,0,0,.5);} to{box-shadow:0 0 40px rgba(255,150,0,.8),0 4px 20px rgba(0,0,0,.5);} }

/* ===== MODAL ===== */
#modal {
position:fixed; inset:0; z-index:100;
background:rgba(0,0,0,.85);
display:flex; align-items:center; justify-content:center;
opacity:0; pointer-events:none; transition:opacity .3s;
}
#modal.show { opacity:1; pointer-events:all; }
.modal-box {
background:linear-gradient(135deg,#1a0a2e,#2a0a1a);
border:2px solid rgba(255,100,0,.6);
border-radius:20px;
padding:40px 32px;
max-width:360px; width:90%;
text-align:center;
box-shadow:0 0 60px rgba(255,50,0,.3);
}
.modal-box h2 { color:#fff; font-size:1.1rem; line-height:1.7; margin-bottom:32px; }
.modal-box h2 span { color:#ff6b35; }
.modal-btns { display:flex; gap:16px; justify-content:center; }
.modal-btn {
padding:14px 32px;
font-size:1rem; font-weight:700;
font-family:‘Noto Sans JP’,sans-serif;
background:linear-gradient(135deg,#ff4500,#cc2200);
color:#fff; border:none; border-radius:12px; cursor:pointer;
box-shadow:0 4px 15px rgba(255,69,0,.4);
transition:transform .15s;
}
.modal-btn:hover { transform:scale(1.05); }

/* ===== GACHA SCREEN ===== */
#gachaScreen {
background: radial-gradient(ellipse at center, #1a0530 0%, #000510 100%);
overflow:hidden;
}

/* Dragon hand – manually draggable */
.dragon-wrap {
position:absolute;
width:100%; top:0; left:0;
display:flex; justify-content:center;
z-index:5;
cursor:grab;
touch-action:none;
user-select:none;
will-change:transform;
}
.dragon-wrap.dragging { cursor:grabbing; }
/* scroll hint */
.drag-hint {
position:absolute; bottom:10%; left:50%; transform:translateX(-50%);
z-index:30; text-align:center; pointer-events:none;
animation: hintBounce 1s infinite alternate;
}
@keyframes hintBounce {
from{transform:translateX(-50%) translateY(0);}
to{transform:translateX(-50%) translateY(14px);}
}
.drag-hint .hint-arrow { font-size:2rem; display:block; color:#FFD700; text-shadow:0 0 15px #ff6600; }
.drag-hint .hint-label { font-size:.9rem; color:rgba(255,255,200,.8); font-weight:700; letter-spacing:.15em; }
/* tease overlay */
#teaseOverlay {
position:absolute; inset:0; z-index:40;
display:flex; flex-direction:column; align-items:center; justify-content:center;
background:rgba(0,0,0,.88);
opacity:0; pointer-events:none; transition:opacity .4s;
}
#teaseOverlay.show { opacity:1; pointer-events:all; }
.tease-text {
font-size:clamp(1.5rem,6vw,2.5rem); font-weight:900; color:#FFD700;
text-shadow:0 0 30px #FFD700, 0 0 60px #ff6600;
text-align:center; padding:0 24px; line-height:1.8;
}
.tease-msg {
font-size:clamp(1rem,4vw,1.6rem); font-weight:700;
color:#fff; text-align:center; margin-top:16px;
text-shadow:0 0 20px rgba(255,100,0,.8);
animation: teasePulse .6s infinite alternate;
}
@keyframes teasePulse { from{opacity:.4; transform:scale(.97);} to{opacity:1; transform:scale(1.03);} }
.tease-sub { font-size:.85rem; color:rgba(255,255,255,.4); margin-top:12px; letter-spacing:.25em; }

/* Light beams */
.light-beams {
position:absolute; inset:0;
background: conic-gradient(from 0deg at 50% 30%,
transparent 0deg, rgba(255,200,0,.08) 10deg, transparent 20deg,
transparent 40deg, rgba(255,150,0,.06) 50deg, transparent 60deg,
transparent 80deg, rgba(255,200,0,.08) 90deg, transparent 100deg,
transparent 120deg, rgba(255,180,0,.05) 130deg, transparent 140deg,
transparent 160deg, rgba(255,200,0,.07) 170deg, transparent 180deg,
transparent 200deg, rgba(255,150,0,.06) 210deg, transparent 220deg,
transparent 240deg, rgba(255,200,0,.08) 250deg, transparent 260deg,
transparent 280deg, rgba(255,180,0,.05) 290deg, transparent 300deg,
transparent 320deg, rgba(255,200,0,.07) 330deg, transparent 340deg,
transparent 360deg
);
animation: rotateLights 8s linear infinite;
}
@keyframes rotateLights { to { transform:rotate(360deg); } }

/* Particles */
.particle {
position:absolute;
border-radius:50%;
pointer-events:none;
animation: particleFly var(–dur,2s) var(–delay,0s) ease-out forwards;
}
@keyframes particleFly {
0%   { transform:translate(0,0) scale(1); opacity:1; }
100% { transform:translate(var(–tx,50px),var(–ty,-100px)) scale(0); opacity:0; }
}

/* Capsule */
.capsule-wrap {
position:absolute; bottom:15%; left:50%; transform:translateX(-50%);
opacity:0; z-index:20;
animation: capsuleAppear .6s .2s ease-out forwards;
}
@keyframes capsuleAppear {
from { transform:translateX(-50%) scale(0) rotate(-20deg); opacity:0; }
to   { transform:translateX(-50%) scale(1) rotate(0deg); opacity:1; }
}
@keyframes capsulePulse {
from { transform:translateX(-50%) scale(1); filter:drop-shadow(0 0 10px #FFD700); }
to   { transform:translateX(-50%) scale(1.12); filter:drop-shadow(0 0 30px #ff6600); }
}
.capsule-crack {
animation: crackOpen .5s ease-out forwards;
}
@keyframes crackOpen {
0%   { transform:scale(1); }
30%  { transform:scale(1.3) rotate(5deg); }
60%  { transform:scale(.8) rotate(-3deg); }
100% { transform:scale(0); opacity:0; }
}

/* Flash */
.flash {
position:fixed; inset:0; z-index:50;
background:#fff;
animation: flashOut .5s ease-out forwards;
pointer-events:none;
}
@keyframes flashOut { from{opacity:1;} to{opacity:0;} }

.shake {
animation: shakeAnim .4s ease-in-out;
}
@keyframes shakeAnim {
0%,100%{transform:translateX(0);}
20%{transform:translateX(-8px);}
40%{transform:translateX(8px);}
60%{transform:translateX(-6px);}
80%{transform:translateX(6px);}
}

/* ===== CARD SCREEN ===== */
#cardScreen {
background:radial-gradient(ellipse at center, #0a0a20 0%, #000 100%);
overflow:hidden;
}

.card-container { position:relative; z-index:10; text-align:center; padding:20px; }
.rarity-label {
font-size:1rem; font-weight:700; letter-spacing:.3em;
margin-bottom:12px;
animation: fadeInUp .5s ease;
}
.rarity-vr .rarity-label { color:#FFD700; text-shadow:0 0 20px #FFD700; }
.rarity-sr .rarity-label { color:#C0C0C0; text-shadow:0 0 15px #C0C0C0; }
.rarity-c  .rarity-label { color:#88aaff; }

.char-card {
display:inline-block;
border-radius:20px;
padding:20px 24px;
margin-bottom:16px;
position:relative;
overflow:hidden;
animation: cardReveal .7s cubic-bezier(.175,.885,.32,1.275) both;
}
@keyframes cardReveal {
from{opacity:0;transform:scale(.5) rotateY(90deg);}
to{opacity:1;transform:scale(1) rotateY(0deg);}
}
.rarity-vr .char-card {
background:linear-gradient(135deg,#1a1000,#3a2800);
border:3px solid #FFD700;
box-shadow:0 0 40px rgba(255,215,0,.6), 0 0 80px rgba(255,215,0,.3), inset 0 0 20px rgba(255,215,0,.1);
}
.rarity-sr .char-card {
background:linear-gradient(135deg,#0f0f1a,#1a1a2a);
border:3px solid #C0C0C0;
box-shadow:0 0 30px rgba(192,192,192,.5), 0 0 60px rgba(192,192,192,.2);
}
.rarity-c .char-card {
background:linear-gradient(135deg,#0a0a1a,#121230);
border:2px solid #446;
box-shadow:0 8px 30px rgba(0,0,0,.5);
}

.char-name {
font-size:1.3rem; font-weight:900; color:#fff;
margin-top:12px;
text-shadow:0 2px 8px rgba(0,0,0,.8);
}
.char-serif {
font-size:.85rem; color:#ffcc88; margin-top:6px;
font-style:italic; line-height:1.4;
}
.next-btn {
padding:14px 40px;
font-size:1.1rem; font-weight:700;
font-family:‘Noto Sans JP’,sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:#fff; border:none; border-radius:50px; cursor:pointer;
box-shadow:0 4px 20px rgba(79,172,254,.4);
transition:transform .15s;
margin-top:8px;
}
.next-btn:hover { transform:scale(1.05); }

/* VR shimmer */
.vr-shimmer {
position:absolute; top:-50%; left:-50%;
width:200%; height:200%;
background: linear-gradient(45deg,transparent 30%,rgba(255,215,0,.15) 50%,transparent 70%);
animation: shimmerMove 2s linear infinite;
}
@keyframes shimmerMove { from{transform:translateX(-100%) translateY(-100%);} to{transform:translateX(50%) translateY(50%);} }

/* Confetti */
.confetti-piece {
position:fixed; top:-10px;
width:10px; height:10px;
border-radius:2px;
animation: confettiFall var(–dur,3s) var(–delay,0s) linear forwards;
pointer-events:none; z-index:200;
}
@keyframes confettiFall {
0%   { transform:translateY(0) rotate(0); opacity:1; }
100% { transform:translateY(110vh) rotate(720deg); opacity:.3; }
}

/* ===== MINIGAME SCREEN ===== */
#miniScreen {
background:#e8f0e0;
overflow:hidden;
}
.field-wrap { position:relative; width:100%; height:100%; }

/* Snow field */
#snowCanvas { position:absolute; inset:0; width:100%; height:100%; }

.mini-ui {
position:absolute; top:16px; left:0; right:0;
display:flex; align-items:center; justify-content:space-between;
padding:0 16px; z-index:20;
}
.tap-counter {
background:rgba(0,0,20,.7);
color:#fff; font-weight:700; font-size:1rem;
padding:8px 16px; border-radius:20px;
}
.quit-btn {
padding:8px 20px;
font-family:‘Noto Sans JP’,sans-serif;
font-size:.9rem; font-weight:700;
background:rgba(200,0,0,.8);
color:#fff; border:none; border-radius:16px; cursor:pointer;
}

/* Walking character */
.walker {
position:absolute; z-index:10; pointer-events:none;
transition:left .3s ease, top .3s ease;
}

/* Clear / Fail overlays */
.result-overlay {
position:fixed; inset:0; z-index:150;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
opacity:0; pointer-events:none;
transition:opacity .5s;
}
.result-overlay.show { opacity:1; pointer-events:all; }
#clearOverlay { background:rgba(0,30,0,.9); }
#failOverlay  { background:rgba(20,0,0,.92); }
.result-title {
font-size:clamp(2rem,8vw,4rem);
font-weight:900; text-align:center; margin-bottom:16px;
}
#clearOverlay .result-title { color:#7fff7f; text-shadow:0 0 30px #0f0; }
#failOverlay  .result-title { color:#ff4444; text-shadow:0 0 30px #f00; }
.result-msg { color:#fff; font-size:1rem; margin-bottom:32px; text-align:center; line-height:1.7; }
.replay-btn {
padding:14px 40px; font-size:1.1rem; font-weight:700;
font-family:‘Noto Sans JP’,sans-serif;
background:linear-gradient(135deg,#ff6b35,#ff3f00);
color:#fff; border:none; border-radius:50px; cursor:pointer;
box-shadow:0 4px 20px rgba(255,100,0,.4);
transition:transform .15s;
}
.replay-btn:hover { transform:scale(1.05); }

/* Percent text on snow */
#percentCanvas { position:absolute; inset:0; width:100%; height:100%; z-index:5; pointer-events:none; opacity:0; transition:opacity .5s; }

/* Angry teacher overlay */
.angry-teacher {
position:fixed; bottom:0; left:50%; transform:translateX(-50%);
z-index:160;
display:flex; flex-direction:column; align-items:center;
animation: teacherSlide .5s ease-out both;
}
@keyframes teacherSlide { from{transform:translateX(-50%) translateY(100%);} to{transform:translateX(-50%) translateY(0);} }
.speech-bubble {
background:#fff; border-radius:16px; padding:12px 20px;
font-size:1rem; font-weight:700; color:#c00;
box-shadow:0 4px 20px rgba(0,0,0,.3);
margin-bottom:8px; text-align:center;
position:relative;
animation: bubbleShake .3s .5s ease-in-out infinite alternate;
max-width:280px;
}
@keyframes bubbleShake { from{transform:rotate(-1deg);} to{transform:rotate(1deg);} }
.speech-bubble::after {
content:’’; position:absolute; bottom:-12px; left:50%;
transform:translateX(-50%);
border:6px solid transparent; border-top-color:#fff;
}

/* ===== SVG CHARS ===== */
.svg-char { display:block; margin:0 auto; }
</style>

</head>

// =============================================
// GACHA
// =============================================
// drag state
let dragState = {active:false, startY:0, currentY:0, dragonY:-100};

function startGacha(){
  document.getElementById('modal').classList.remove('show');
  const title = document.getElementById('titleScreen');
  const gacha = document.getElementById('gachaScreen');
  title.classList.add('hidden');
  gacha.classList.remove('hidden');

  // determine result
  const r = Math.random();
  let pool;
  if(r < 0.05) pool = CHARS.filter(c=>c.rarity==='vr');
  else if(r < 0.25) pool = CHARS.filter(c=>c.rarity==='sr');
  else pool = CHARS.filter(c=>c.rarity==='c');
  currentChar = pool[Math.floor(Math.random()*pool.length)];

  // show dragon, animate descent
  dragState = {active:false, startY:0, currentY:0, dragonY:-60, triggered:false};
  const dw = document.getElementById('dragonWrap');
  dw.style.display = 'flex';
  dw.style.transition = 'transform 1.2s cubic-bezier(.2,0,.6,1)';
  dw.style.transform = 'translateY(-60%)';

  // tap anywhere on gacha screen to trigger
  function onGachaTap(e){
    if(dragState.triggered) return;
    gacha.removeEventListener('click', onGachaTap);
    gacha.removeEventListener('touchstart', onGachaTap);
    onDragTriggered(dw, gacha);
  }
  gacha.addEventListener('click', onGachaTap);
  gacha.addEventListener('touchstart', onGachaTap, {passive:true});
  dragState._cleanup = ()=>{
    gacha.removeEventListener('click', onGachaTap);
    gacha.removeEventListener('touchstart', onGachaTap);
  };

  spawnParticles();
}

function onDragTriggered(dw, gacha){
  if(dragState.triggered) return;
  dragState.triggered = true;
  dragState._cleanup && dragState._cleanup();

  // hide drag hint
  document.getElementById('dragHint').style.display='none';

  // animate dragon slamming down
  dw.style.transition = 'transform .3s cubic-bezier(.2,1.5,.4,1)';
  dw.style.transform = 'translateY(10%)';

  // big shake
  gacha.classList.add('shake');
  setTimeout(()=>gacha.classList.remove('shake'),500);

  spawnParticles();

  // show capsule
  setTimeout(()=>{
    const cw = document.getElementById('capsuleWrap');
    cw.classList.remove('hidden');

    // flash
    const flash = document.createElement('div');
    flash.className = 'flash';
    document.body.appendChild(flash);
    setTimeout(()=>flash.remove(), 600);
  }, 400);

  // tap capsule to crack
  setTimeout(()=>{
    const cw = document.getElementById('capsuleWrap');
    cw.style.cursor = 'pointer';
    cw.onclick = crackCapsule;
    cw.ontouchstart = crackCapsule;
    // pulse hint
    cw.style.animation = 'capsulePulse .6s infinite alternate';
    const lbl = document.createElement('div');
    lbl.id = 'tapCapsuleHint';
    lbl.style.cssText = 'position:absolute;bottom:6%;left:0;right:0;text-align:center;z-index:25;color:#FFD700;font-weight:700;font-size:1rem;text-shadow:0 0 10px #ff6600;animation:hintBounce 1s infinite alternate;';
    lbl.textContent = '👆 カプセルをタップ！';
    gacha.appendChild(lbl);
  }, 800);
}

function crackCapsule(){
  const cw = document.getElementById('capsuleWrap');
  if(!cw || cw.dataset.cracked) return;
  cw.dataset.cracked = '1';
  cw.onclick = null; cw.ontouchstart = null;
  const hint = document.getElementById('tapCapsuleHint');
  if(hint) hint.remove();

  const svg = document.getElementById('capsuleSvg');
  svg.classList.add('capsule-crack');
  const flash = document.createElement('div');
  flash.className = 'flash';
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(), 600);

  // begin tease sequence
  setTimeout(startTeaseSequence, 600);
}

function startTeaseSequence(){
  document.getElementById('gachaScreen').querySelector('.light-beams').style.animation='rotateLights .5s linear infinite';
  const overlay = document.getElementById('teaseOverlay');
  overlay.classList.add('show');
  spawnParticles();

  const c = currentChar;
  const rarityLabel = c.rarity==='vr'?'⭐⭐⭐⭐ VICTORY RARE！！':c.rarity==='sr'?'⭐⭐⭐ SUPER RARE！':'⭐⭐ COMMON';
  const tauntLines = [
    ['なんと…', 'この人物は…', rarityLabel],
    ['まさか…', '見附が誇る', 'あの人物か！？'],
    ['ッッッ！！', 'その名は…', '…………'],
  ];
  const seq = tauntLines[Math.floor(Math.random() * tauntLines.length)];

  const teaseText = document.getElementById('teaseText');
  const teaseMsg = document.getElementById('teaseMsg');
  const teaseSub = document.getElementById('teaseSub');

  teaseText.textContent = seq[0];
  teaseMsg.textContent = '';
  teaseSub.textContent = '';

  // step 1
  setTimeout(()=>{
    teaseMsg.textContent = seq[1];
    teaseMsg.style.animation='teasePulse .6s infinite alternate';
  }, 700);
  // step 2
  setTimeout(()=>{
    teaseSub.textContent = seq[2];
    spawnParticles();
    // big flash
    const fl = document.createElement('div');
    fl.className='flash'; document.body.appendChild(fl);
    setTimeout(()=>fl.remove(),500);
  }, 1800);
  // reveal card
  setTimeout(()=>{
    overlay.classList.remove('show');
    showCard();
  }, 3200);
}

function spawnParticles(){
  const container = document.getElementById('particleContainer');
  const colors = ['#FFD700','#ff6600','#ff0044','#00ffff','#ff00ff','#ffffff'];
  for(let i=0;i<60;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const c = colors[Math.floor(Math.random()*colors.length)];
    const sz = Math.random()*8+3;
    const tx = (Math.random()-0.5)*300;
    const ty = -(Math.random()*300+100);
    const dur = (Math.random()*1.5+1).toFixed(1);
    const delay = (Math.random()*2).toFixed(1);
    p.style.cssText = `width:${sz}px;height:${sz}px;background:${c};left:${Math.random()*100}%;top:${Math.random()*100}%;--tx:${tx}px;--ty:${ty}px;--dur:${dur}s;--delay:${delay}s;`;
    container.appendChild(p);
  }
  setTimeout(()=>container.innerHTML='', 5000);
}

// CARD

function showCard(){
  document.getElementById('gachaScreen').classList.add('hidden');
  const cs = document.getElementById('cardScreen');
  cs.classList.remove('hidden');

  const c = currentChar;
  const rarityClass = `rarity-${c.rarity}`;
  const bg = document.getElementById('cardBg');

  if(c.rarity==='vr'){
    bg.style.background = 'radial-gradient(ellipse at center,#2a1500 0%,#000 100%)';
    // confetti
    spawnConfetti(80);
  } else if(c.rarity==='sr'){
    bg.style.background = 'radial-gradient(ellipse at center,#0a0a20 0%,#000 100%)';
    spawnConfetti(30);
  } else {
    bg.style.background = 'radial-gradient(ellipse at center,#050520 0%,#000 100%)';
  }

  const rarityText = c.rarity==='vr'?'⭐⭐⭐⭐ VICTORY RARE':c.rarity==='sr'?'⭐⭐⭐ SUPER RARE':'⭐⭐ COMMON';

  const container = document.getElementById('cardContainer');
  container.className = `card-container ${rarityClass}`;
  container.innerHTML = `
    <div class="rarity-label">${rarityText}</div>
    <div class="char-card">
      ${c.rarity==='vr'?'<div class="vr-shimmer"></div>':''}
      ${c.svg}
      <div class="char-name">${c.name}</div>
      ${c.serif?`<div class="char-serif">「${c.serif}」</div>`:''}
    </div>
    <button class="next-btn" onclick="startMini()">⛄ ミニゲームへ</button>
  `;
}

function spawnConfetti(n){
  const colors=['#FFD700','#ff6b35','#ff3399','#33aaff','#66ff44','#ff44ff'];
  for(let i=0;i<n;i++){
    const el = document.createElement('div');
    el.className='confetti-piece';
    const c=colors[Math.floor(Math.random()*colors.length)];
    el.style.cssText=`left:${Math.random()*100}%;background:${c};--dur:${(Math.random()*2+2).toFixed(1)}s;--delay:${(Math.random()*2).toFixed(1)}s;transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  }
}

// =============================================
// MINI GAME
// =============================================
function startMini(){
  document.getElementById('cardScreen').classList.add('hidden');
  document.getElementById('miniScreen').classList.remove('hidden');

  tapCount=0;
  footprints=[];
  miniRunning=true;
  miniStartTime = null;

  const canvas = document.getElementById('snowCanvas');
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;
  canvas.width = W;
  canvas.height = H;
  drawSnow(canvas);

  // place walker
  walkerPos = {x: W*0.2, y: H*0.5};
  updateWalker();

  document.getElementById('tapCounter').textContent = `⏱ 5.0s　タップ: 0 / 20`;

  // auto-walk
  walkerMoveTimer = setInterval(autoWalk, 600);

  // 5s countdown timer (renders every 100ms)
  const LIMIT = 5000;
  miniStartTime = Date.now();
  quitTimer = setInterval(()=>{
    if(!miniRunning) { clearInterval(quitTimer); return; }
    const elapsed = Date.now() - miniStartTime;
    const remain = Math.max(0, (LIMIT - elapsed) / 1000);
    document.getElementById('tapCounter').textContent = `⏱ ${remain.toFixed(1)}s　タップ: ${tapCount} / 20`;
    if(elapsed >= LIMIT) {
      clearInterval(quitTimer);
      if(miniRunning) triggerFail();
    }
  }, 100);

  // tap listener
  canvas.addEventListener('click', onTap);
  canvas.addEventListener('touchstart', onTap, {passive:true});

  const pct = document.getElementById('percentCanvas');
  pct.width = W; pct.height = H;
  pct.style.opacity='0';
}

function drawSnow(canvas){
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  // sky tint at top
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#d8e8f0');
  grad.addColorStop(1,'#ffffff');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // snow texture dots
  ctx.fillStyle='rgba(255,255,255,.8)';
  for(let i=0;i<200;i++){
    ctx.beginPath();
    ctx.arc(Math.random()*W, Math.random()*H, Math.random()*3+1, 0, Math.PI*2);
    ctx.fill();
  }

  // fence at edge
  ctx.strokeStyle='#aabbcc';
  ctx.lineWidth=3;
  ctx.setLineDash([8,6]);
  ctx.strokeRect(10,10,W-20,H-20);
  ctx.setLineDash([]);

  // label
  ctx.fillStyle='rgba(0,0,80,.25)';
  ctx.font=`bold ${Math.min(W,H)*0.06}px 'Noto Sans JP',sans-serif`;
  ctx.textAlign='center';
  ctx.fillText('校 庭', W/2, H*0.12);
}

function autoWalk(){
  if(!miniRunning) return;
  const canvas = document.getElementById('snowCanvas');
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  walkerPos.x += (Math.random()-0.5)*80;
  walkerPos.y += (Math.random()-0.5)*60;
  walkerPos.x = Math.max(30, Math.min(W-30, walkerPos.x));
  walkerPos.y = Math.max(60, Math.min(H-60, walkerPos.y));
  updateWalker();
}

function updateWalker(){
  const el = document.getElementById('walker');
  el.style.left = walkerPos.x + 'px';
  el.style.top  = walkerPos.y + 'px';
  el.style.transform = 'translate(-50%,-50%)';
  el.innerHTML = `<svg viewBox="0 0 50 60" width="50" height="60" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="25" cy="15" rx="13" ry="13" fill="#f5c8a0"/>
    <rect x="12" y="26" width="26" height="26" rx="6" fill="#3366cc"/>
    <ellipse cx="16" cy="52" rx="7" ry="6" fill="#223"/>
    <ellipse cx="34" cy="52" rx="7" ry="6" fill="#223"/>
  </svg>`;
}

function onTap(e){
  if(!miniRunning) return;
  e.preventDefault && e.preventDefault();
  const canvas = document.getElementById('snowCanvas');
  const rect = canvas.getBoundingClientRect();
  let cx, cy;
  if(e.touches){ cx=e.touches[0].clientX-rect.left; cy=e.touches[0].clientY-rect.top; }
  else { cx=e.clientX-rect.left; cy=e.clientY-rect.top; }

  tapCount++;
  footprints.push({x:cx, y:cy});
  drawFootprint(canvas, cx, cy);
  document.getElementById('tapCounter').textContent = `⏱ ${Math.max(0,((5000-(Date.now()-miniStartTime))/1000)).toFixed(1)}s　タップ: ${tapCount} / 20`;

  // move walker toward tap
  walkerPos = {x:cx, y:cy};
  updateWalker();

  if(tapCount >= 20) triggerClear();
}

function drawFootprint(canvas, x, y){
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.fillStyle='rgba(80,100,140,.5)';
  // left foot
  ctx.beginPath();
  ctx.ellipse(x-6, y, 4, 7, -0.3, 0, Math.PI*2);
  ctx.fill();
  // right foot
  ctx.beginPath();
  ctx.ellipse(x+6, y-12, 4, 7, 0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function triggerClear(){
  if(!miniRunning) return;
  miniRunning=false;
  clearInterval(quitTimer);
  clearInterval(walkerMoveTimer);

  // draw arigatou with footprints
  drawArigatou();

  spawnConfetti(100);
  setTimeout(()=>{
    document.getElementById('clearOverlay').classList.add('show');
  }, 1000);
}

function drawArigatou(){
  const canvas = document.getElementById('snowCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.save();
  ctx.fillStyle='rgba(60,80,140,.6)';
  ctx.font = `bold ${W*0.12}px 'Noto Sans JP',sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  // draw text as footprint dots
  const offscreen = document.createElement('canvas');
  offscreen.width=W; offscreen.height=H;
  const oc = offscreen.getContext('2d');
  oc.fillStyle='#000';
  oc.font = `bold ${W*0.12}px 'Noto Sans JP',sans-serif`;
  oc.textAlign='center';
  oc.textBaseline='middle';
  oc.fillText('ありがとう', W/2, H*0.55);

  const imgData = oc.getImageData(0,0,W,H).data;
  for(let py=0;py<H;py+=12){
    for(let px=0;px<W;px+=14){
      const idx=(py*W+px)*4;
      if(imgData[idx+3]>128){
        ctx.beginPath();
        ctx.ellipse(px,py,3,5,-0.3,0,Math.PI*2);
        ctx.fill();
      }
    }
  }
  ctx.restore();
}

function triggerFail(){
  if(!miniRunning) return;
  miniRunning=false;
  clearInterval(quitTimer);
  clearInterval(walkerMoveTimer);

  const canvas = document.getElementById('snowCanvas');
  canvas.removeEventListener('click', onTap);
  canvas.removeEventListener('touchstart', onTap);

  // draw % on field
  drawPercent();

  document.getElementById('failMsg').textContent = '校庭に「％」という文字が…';
  setTimeout(()=>{
    document.getElementById('failOverlay').classList.add('show');
    showAngryTeacher();
  }, 1000);
}

function drawPercent(){
  const pct = document.getElementById('percentCanvas');
  const W = pct.width, H = pct.height;
  const ctx = pct.getContext('2d');
  pct.style.opacity='1';

  // footprint % shape
  const offscreen = document.createElement('canvas');
  offscreen.width=W; offscreen.height=H;
  const oc = offscreen.getContext('2d');
  oc.fillStyle='#000';
  oc.font = `bold ${Math.min(W,H)*0.55}px monospace`;
  oc.textAlign='center';
  oc.textBaseline='middle';
  oc.fillText('%', W/2, H/2);

  ctx.fillStyle='rgba(100,60,60,.65)';
  const imgData = oc.getImageData(0,0,W,H).data;
  for(let py=0;py<H;py+=14){
    for(let px=0;px<W;px+=16){
      const idx=(py*W+px)*4;
      if(imgData[idx+3]>128){
        ctx.beginPath();
        ctx.ellipse(px,py,4,6,-0.3,0,Math.PI*2);
        ctx.fill();
      }
    }
  }
}

function showAngryTeacher(){
  const el = document.getElementById('angryTeacher');
  el.style.display='flex';

  // pick a teacher SVG
  const teachers = CHARS.filter(c=>c.id==='hasegawa_r'||c.id==='sudo'||c.id==='inoue_h');
  const t = teachers[Math.floor(Math.random()*teachers.length)];
  document.getElementById('angryTeacherSvg').innerHTML = t.svg;
}

function quitMini(){
  if(!miniRunning) return;
  clearTimeout(quitTimer);
  triggerFail();
}

function restartAll(){
  // reset all
  document.getElementById('clearOverlay').classList.remove('show');
  document.getElementById('failOverlay').classList.remove('show');
  document.getElementById('angryTeacher').style.display='none';
  document.getElementById('miniScreen').classList.add('hidden');
  document.getElementById('cardScreen').classList.add('hidden');
  document.getElementById('gachaScreen').classList.add('hidden');
  document.getElementById('dragonWrap').style.display='none';
  document.getElementById('capsuleWrap').classList.add('hidden');
  document.getElementById('capsuleSvg').classList.remove('capsule-crack');
  document.getElementById('percentCanvas').style.opacity='0';
  document.getElementById('titleScreen').classList.remove('hidden');
  miniRunning=false; tapCount=0; footprints=[];
  if(dragState && dragState._cleanup) dragState._cleanup();
  dragState = {active:false, startY:0, currentY:0, dragonY:-60, triggered:false};
  const canvas=document.getElementById('snowCanvas');
  canvas.removeEventListener('click',onTap);
  canvas.removeEventListener('touchstart',onTap);
  // reset capsule cracked state
  const cw2 = document.getElementById('capsuleWrap');
  if(cw2) { cw2.dataset.cracked=''; cw2.style.cursor=''; cw2.style.animation=''; }
  document.getElementById('capsuleSvg').classList.remove('capsule-crack');
  document.getElementById('teaseOverlay').classList.remove('show');
  document.getElementById('dragHint').style.display='';
}
